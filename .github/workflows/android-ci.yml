name: Android CI

on:
  pull_request:
    branches: 
     - main
     - develop_kbs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gradle 캐시 복원 (명시적 캐시 설정)
      - name: Gradle 캐시 복원
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 1. google-services.json 복구 (빌드 전에 반드시 실행!)
      - name: Restore google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json

      # 2. 키스토어 파일 복원 (추가)
      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > release_key_v2

      # 3. local.properties 생성
      - name: Generate local.properties
        run: |
          echo "TEUMTEUM_KEY_ALIAS=${{ secrets.TEUMTEUM_KEY_ALIAS }}" >> local.properties
          echo "TEUMTEUM_KEY_PASSWORD=${{ secrets.TEUMTEUM_KEY_PASSWORD }}" >> local.properties
          # 환경변수 $GITHUB_WORKSPACE를 사용하여 원격 서버의 절대 경로를 완성합니다.
          echo "TEUMTEUM_STORE_FILE=$GITHUB_WORKSPACE/release_key_v2" >> local.properties
          echo "TEUMTEUM_STORE_PASSWORD=${{ secrets.TEUMTEUM_STORE_PASSWORD }}" >> local.properties

      # CI 전용 Gradle 프로퍼티 설정
      - name: CI 전용 Gradle 프로퍼티 설정
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<EOF
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          kotlin.incremental=false
          EOF

      - name: Change permissions for gradlew
        run: chmod +x gradlew

      # 4. 모든 파일이 준비된 후 코드안정성 검사를 위해 gradle 빌드 실행
      - name: Gradle build
        run: |
          echo "Build start: $(date)"
          ./gradlew compileDebugKotlin --parallel --build-cache --stacktrace
          echo "Build end: $(date)"

      

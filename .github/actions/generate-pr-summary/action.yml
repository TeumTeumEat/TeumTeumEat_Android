name: 'Generate PR Summary'
description: 'Collects data and calls OpenAI to generate PR body'
inputs:
  openai_api_key:
    required: true
  stats_file:
    required: true
  files_file:
    required: true
  diff_file:
    required: true
  jira_file:     # 추가된 부분
    required: true

outputs:
  body:
    description: "Generated PR body in markdown format"
    value: "${{ steps.gen.outputs.body }}"

runs:
  using: "composite"
  steps:
    - name: "Generate PR Markdown"
      id: "gen"
      shell: "bash"
      env:
        OPENAI_API_KEY: "${{ inputs.openai_api_key }}"
      run: |
        set -euo pipefail

        # -----------------------------
        # 1) Prompt (MARKDOWN ONLY)
        # -----------------------------
        cat > /tmp/prompt.txt << 'EOF'
        당신은 숙련된 소프트웨어 엔지니어이며, 리뷰어가 한눈에 이해할 수 있는 '좋은 PR' 본문을 한국어로 작성해야 합니다.

        [작성 원칙]
        1. Context 우선: Jira 티켓의 목적을 바탕으로 '왜(Why)' 이 작업을 했는지 명시하세요.
        2. 간결한 설명: '어떻게(How)' 변경했는지 핵심 로직 위주로 요약하세요.
        3. 리뷰어 배려: 영향 범위나 주의사항(Side Effect)이 있다면 반드시 언급하세요.
        4. 시각화 유도: UI 변경이 있을 경우 스크린샷을 올릴 수 있는 자리를 마련하세요.

        [출력 양식]
        > 🤖 **AI가 Jira 티켓과 코드 변경점을 분석하여 생성후 수정할 PR입니다.**

        ## 🔗 What is the PR?
        - Jira Ticket: (Jira 정보를 바탕으로 작성)

        ## 📝 작업 개요
        (이 PR을 통해 달성하려는 목표와 배경을 1-2문장으로 설명)

        ## 🚀 주요 변경 사항
        - (기능 단위의 핵심 변경점 3-5개)
        - (코드 구현 방식의 변화가 있다면 짧게 요약)

        ## 📸 스크린샷 (선택 사항)
        > UI 변경이 있다면 여기에 이미지를 첨부해주세요.

        ## ⚠️ 리뷰어 참고 사항
        - (영향을 받는 다른 모듈이나 주의 깊게 봐달라는 내용)

        --- Stats ---
        EOF
        cat "${{ inputs.stats_file }}" >> /tmp/prompt.txt
        cat >> /tmp/prompt.txt << 'EOF'

        --- Files ---
        EOF
        cat "${{ inputs.files_file }}" >> /tmp/prompt.txt
        cat >> /tmp/prompt.txt << 'EOF'

        --- Diff ---
        EOF
        cat "${{ inputs.diff_file }}" >> /tmp/prompt.txt

        PROMPT="$(cat /tmp/prompt.txt)"
        echo "📝 Prompt size: $(printf "%s" "$PROMPT" | wc -c | tr -d ' ') characters"

        # -----------------------------
        # 2) Call OpenAI with retries
        # -----------------------------
        BODY=""

        for i in {1..3}; do
          echo "🔄 OpenAI API 호출 시도 $i/3"

          RESPONSE="$(curl -sS https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"input\": [
                {\"role\": \"system\", \"content\": \"Write a concise GitHub Pull Request summary in Korean Markdown. Under 15 lines. Return markdown only.\"},
                {\"role\": \"user\", \"content\": $(printf \"%s\" \"$PROMPT\" | jq -Rs .)}
              ],
              \"max_output_tokens\": 4096
            }")"

          # API error 체크
          if echo "$RESPONSE" | jq -e '.error' >/dev/null 2>&1; then
            echo "❌ API Error: $(echo "$RESPONSE" | jq -r '.error.message // .error')"
            [ $i -lt 3 ] && sleep $((i * 2))
            continue
          fi

          # Markdown 본문 추출
          BODY="$(echo "$RESPONSE" | jq -r '[.output[]?.content[]?.text // ""] | join("")')"

          if [ -n "$BODY" ] && [ "$BODY" != "null" ]; then
            echo "✅ PR 생성 완료"
            break
          fi

          echo "⚠️  본문 추출 실패 - 재시도 중"
          [ $i -lt 3 ] && sleep $((i * 2))
        done

        if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
          echo "❌ OpenAI API 호출 실패(본문 비어있음)"
          exit 1
        fi

        # -----------------------------
        # 3) Use markdown AS-IS
        # -----------------------------
        echo "body<<EOF" >> "$GITHUB_OUTPUT"
        printf "%s\n" "$BODY" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"